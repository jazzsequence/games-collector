name: Lint & Test
on: [push]
permissions:
  contents: write
  actions: read
  pull-requests: write
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Lint
        run: composer lint
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Start MySQL
        run: sudo systemctl start mysql
      - name: Setup WP-CLI
        uses: godaddy-wordpress/setup-wp-cli@1
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        run: |
          chmod +x bin/*.sh
          bash ./bin/phpunit-test.sh