name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from plugin header
        id: version
        run: |
          VERSION=$(grep -m1 "Version:" plugin.php | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.tag_check.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install PHP dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build assets
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          npm install
          npm run build

      - name: Create plugin zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PLUGIN_SLUG="games-collector"
          mkdir -p "/tmp/${PLUGIN_SLUG}"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.scrutinizer.yml' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='assets/sass' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='webpack.config.js' \
            --exclude='phpcs.xml' \
            --exclude='phpunit.xml.dist' \
            ./ "/tmp/${PLUGIN_SLUG}/"
          cd /tmp
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          echo "zip_path=/tmp/${PLUGIN_SLUG}.zip" >> "$GITHUB_ENV"

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create release with auto-generated notes
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest \
            "${zip_path}#games-collector.zip"
